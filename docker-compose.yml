version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: charity_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-charity_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-charity_pass}
      POSTGRES_DB: ${POSTGRES_DB:-charity_cms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-charity_user} -d ${POSTGRES_DB:-charity_cms}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: charity_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-charity_user}:${POSTGRES_PASSWORD:-charity_pass}@db:5432/${POSTGRES_DB:-charity_cms}
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: charity_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
  uploads_data:
